schema_version: 1
kind: skill

metadata:
  name: mujitask-tiktok-feishu-sync
  title: mujitask-tiktok-feishu-sync
  description: >-
    Submits OpenClaw task requests for the current TikTok/TK Feishu workflows:
    competitor-table refresh, competitor keyword search, influencer-pool sync,
    selection-table ingest, and selection keyword search. Use only when the user
    explicitly asks to run, sync, update, complete, search, collect, or write data
    to TK竞品收集, TK选品收集, or TK达人池. Do not use for conceptual questions,
    strategy discussion, skill review, configuration support, or general FastMoss
    questions without an explicit table/workflow target.
  short_description: TK选品、竞品、达人池与FastMoss任务提交
  owner: domains/tiktok
  side_effects: true

source_of_truth:
  business_overview: docs/business/business-requirements.md
  requirements_index: docs/business/requirements/README.md

formal_task_codes:
  - refresh_current_competitor_table
  - search_keyword_competitor_products
  - sync_tk_influencer_pool
  - tiktok_fastmoss_product_ingest
  - search_keyword_selection_products

purpose:
  - Use this skill to submit one top-level OpenClaw task request for the current TikTok/TK Feishu business workflows.
  - This skill only submits the task and returns `request_id`.
  - The actual execution, table writeback, retry behavior, and final Feishu notification are handled by Runtime workflow, workers, and outbox.

when_to_use:
  - Refresh or manually run the current `TK竞品收集` competitor-table workflow.
  - Search keyword products and write new competitor seed rows to `TK竞品收集`.
  - Sync influencer data from `TK竞品收集` to `TK达人池`.
  - Ingest or complete data for `TK选品收集`.
  - Search keyword products and write new selection seed rows to `TK选品收集`.

execution_actions:
  - run
  - sync
  - update
  - complete
  - submit
  - search and write
  - collect and write
  - 手动跑一次
  - 提交一次
  - 补全
  - 同步
  - 更新
  - 写入

do_not_use:
  - asking what TikTok, TK, FastMoss, OpenClaw, or Feishu means
  - asking how to design a table or workflow
  - asking to analyze, edit, review, or debug this skill
  - discussing TikTok competitor strategy without asking to update the current Feishu table
  - discussing product-selection strategy without asking to write to `TK选品收集`
  - asking about credentials, tokens, environment variables, browser profiles, Runtime DB, deployment, or troubleshooting
  - saying only “FastMoss”, “TK竞品”, “写入飞书”, or “更新当前表” without a clear workflow or target table

inputs:
  product_url:
    description: TikTok product URL.
    extraction_rules:
      - Extract only TikTok product URLs.
      - If a single-URL workflow receives multiple URLs, ask the user to provide one URL.
      - Do not infer competitor-table intent from URL alone.
  search_keyword:
    description: Keyword for FastMoss / TikTok product search.
    extraction_rules:
      - Do not treat “FastMoss”, “找品”, “搜索”, “写入飞书”, “竞品”, or “选品” as the keyword.
      - If keyword search is requested but no keyword is present, ask only for the keyword.
  sales_7d_threshold:
    description: Near-7-day sales threshold.
    defaults_by_intent:
      keyword_competitor_search: 200
      keyword_selection_search: 500
    extraction_examples:
      - "7日销量300以上 -> 300"
      - "近7天销量超过300 -> 300"
      - "7d sales >= 300 -> 300"
      - "销量阈值300 -> 300"
  price_range_max_threshold:
    description: Price-range maximum threshold.
    usage: Use only for `keyword_selection_search`.
    defaults_by_intent:
      keyword_selection_search: 10.99
    extraction_rules:
      - Extract from expressions such as `价格大于 10.99`, `price range maximum >= 10.99`, `价格区间最大值大于 12`.
      - Price filtering is for candidate filtering only. Do not use it as a pagination stop condition.
  max_candidates:
    description: Maximum number of keyword-search candidates.
    defaults_by_intent:
      keyword_competitor_search: 20
    extraction_rules:
      - User says `不限制候选数`, `全部`, or `所有满足条件商品` -> `0`.
      - User says `最多 50 个`, `抓 50 条`, or `候选 50 条` -> `50`.

intents:
  - id: competitor_table_refresh
    kind: formal_workflow
    title: 竞品采集
    business_flow_name: 竞品采集
    task_code: refresh_current_competitor_table
    target_tables:
      - TK竞品收集
    trigger_mode_from_requirements: daily scheduled task
    conversation_activation: explicit manual submission only
    source_documents:
      requirements:
        - docs/business/requirements/refresh-current-competitor-table.md
      design:
        - docs/arch/workflow-competitor-table-design.md
    description: Use when the user explicitly asks to manually run, refresh, update, or sync the current competitor table.
    do_not_use: Do not use for keyword search, product-selection search, influencer-pool sync, or general competitor-analysis discussion.
    command: bash skills/mujitask-tiktok-feishu-sync/run_task.sh --intent "competitor_table_refresh"
    required_inputs: []
    optional_inputs: []
    default_values: {}
    side_effects:
      - submit runtime task_request
      - read TK竞品收集
      - write competitor refresh results through async workers
      - send final outbox notification

  - id: keyword_competitor_search
    kind: formal_workflow
    title: 关键词搜索竞品写入
    business_flow_name: 关键词搜索竞品写入
    task_code: search_keyword_competitor_products
    target_tables:
      - TK竞品收集
    trigger_mode_from_requirements: OpenClaw conversation input
    source_documents:
      requirements:
        - docs/business/requirements/search-keyword-competitor-products.md
      design:
        - docs/arch/workflow-competitor-table-design.md
    description: Use when the user asks to search or collect keyword products and write new competitor rows to `TK竞品收集`.
    do_not_use: Do not use when the user says `选品`, `选品表`, or `TK选品收集`.
    command: bash skills/mujitask-tiktok-feishu-sync/run_task.sh --intent "keyword_competitor_search" --search-keyword "<search_keyword>" --sales-7d-threshold <sales_7d_threshold> --max-candidates <max_candidates>
    required_inputs:
      - search_keyword
    optional_inputs:
      - sales_7d_threshold
      - max_candidates
    default_values:
      sales_7d_threshold: 200
      max_candidates: 20
    side_effects:
      - submit runtime task_request
      - call FastMoss keyword search
      - insert new TK竞品收集 seed rows through async workers
      - send final outbox notification

  - id: influencer_pool_sync
    kind: formal_workflow
    title: 达人池同步
    business_flow_name: 竞品到达人池同步
    task_code: sync_tk_influencer_pool
    source_tables:
      - TK竞品收集
    target_tables:
      - TK达人池
    trigger_mode_from_requirements: daily scheduled task
    conversation_activation: explicit manual submission only
    source_documents:
      requirements:
        - docs/business/requirements/sync-tk-influencer-pool.md
      design:
        - docs/arch/workflow-influencer-pool-sync-design.md
    description: Use when the user explicitly asks to sync influencer-pool data, expand influencers from competitor products, or update `TK达人池`.
    command: bash skills/mujitask-tiktok-feishu-sync/run_task.sh --intent "influencer_pool_sync"
    required_inputs: []
    optional_inputs: []
    default_values: {}
    side_effects:
      - submit runtime task_request
      - read TK竞品收集 and TK达人池
      - write influencer-pool rows through async workers
      - send final outbox notification

  - id: selection_table_ingest
    kind: formal_workflow
    title: 选品采集
    business_flow_name: 选品采集
    task_code: tiktok_fastmoss_product_ingest
    target_tables:
      - TK选品收集
    trigger_mode_from_requirements: OpenClaw scheduled or manual trigger
    source_documents:
      requirements:
        - docs/business/requirements/tk-selection-collection.md
      design:
        - docs/arch/workflow-selection-table-design.md
    description: Use when the user asks to complete, ingest, update, or scan `TK选品收集`.
    behavior_summary:
      - This workflow scans existing selection records and fills missing automatically maintained fields.
    command: bash skills/mujitask-tiktok-feishu-sync/run_task.sh --intent "selection_table_ingest"
    required_inputs: []
    optional_inputs: []
    default_values: {}
    side_effects:
      - submit runtime task_request
      - read TK选品收集
      - write selection-table completion results through async workers
      - send final outbox notification

  - id: keyword_selection_search
    kind: formal_workflow
    title: 关键词搜索选品写入
    business_flow_name: 关键词搜索选品写入
    task_code: search_keyword_selection_products
    target_tables:
      - TK选品收集
    trigger_mode_from_requirements: OpenClaw conversation input
    source_documents:
      requirements:
        - docs/business/requirements/search-keyword-selection-products.md
      design:
        - docs/arch/workflow-selection-table-design.md
    description: Use when the user asks to search keyword products and write new selection seed rows to `TK选品收集`.
    command: bash skills/mujitask-tiktok-feishu-sync/run_task.sh --intent "keyword_selection_search" --search-keyword "<search_keyword>" --sales-7d-threshold <sales_7d_threshold> --price-range-max-threshold <price_range_max_threshold>
    required_inputs:
      - search_keyword
    optional_inputs:
      - sales_7d_threshold
      - price_range_max_threshold
    default_values:
      sales_7d_threshold: 500
      price_range_max_threshold: 10.99
    behavior_summary:
      - Search FastMoss product candidates by keyword.
      - Filter candidates before insert.
      - Skip existing products without overwrite, refresh, or detail fan-out.
      - Insert new selection seed rows using `insert_if_absent`.
      - Seed rows preserve keyword source.
      - Only newly inserted rows trigger row-level `tiktok_fastmoss_product_ingest`.
    side_effects:
      - submit runtime task_request
      - call FastMoss keyword search
      - insert new TK选品收集 seed rows through async workers
      - dispatch row-level selection detail collection for inserted rows
      - send final outbox notification

  - id: product_url_complete
    kind: operational_sub_intent
    title: 单商品 URL 补全
    parent_task_code: tiktok_fastmoss_product_ingest
    mode: single_product_url
    target_tables:
      - TK选品收集
    description: Use only when the user provides one TikTok product URL and asks to complete that single product using selection-table semantics.
    command: bash skills/mujitask-tiktok-feishu-sync/run_task.sh --intent "product_url_complete" --product-url "<product_url>"
    required_inputs:
      - product_url
    optional_inputs: []
    default_values: {}
    side_effects:
      - submit runtime task_request
      - collect TikTok and FastMoss product facts
      - write selection-table completion results through async workers
      - send final outbox notification

  - id: competitor_row_by_url
    kind: operational_sub_intent
    title: 竞品表单行 URL 定位并补全
    parent_task_code: refresh_current_competitor_table
    mode: single_competitor_row_by_url
    target_tables:
      - TK竞品收集
    description: Use only when the user explicitly mentions competitor row, competitor URL, or `竞品表单行`, and provides one TikTok product URL.
    command: bash skills/mujitask-tiktok-feishu-sync/run_task.sh --intent "competitor_row_by_url" --product-url "<product_url>"
    required_inputs:
      - product_url
    optional_inputs: []
    default_values: {}
    side_effects:
      - submit runtime task_request
      - read TK竞品收集
      - write one competitor row through async workers
      - send final outbox notification

workflow:
  - Identify whether the user is asking to submit a task. If not, do not use this skill.
  - Select exactly one workflow.
  - Extract only the inputs required by that workflow.
  - Apply workflow-specific defaults.
  - Validate missing or ambiguous inputs.
  - Run exactly one command.
  - Wait until the command exits and emits `__OPENCLAW_RESULT__`.
  - Parse `request_id`.
  - Reply using the required output format.
  - Do not poll Runtime jobs after task submission.

intent_precedence:
  - If the user explicitly says `竞品`, `竞品表`, or `TK竞品收集` and asks for keyword search or collection, choose `keyword_competitor_search`.
  - If the user explicitly says `选品`, `选品表`, or `TK选品收集` and asks for keyword search or collection, choose `keyword_selection_search`.
  - If the user asks to complete, ingest, scan, or update `TK选品收集` without keyword-search semantics, choose `selection_table_ingest`.
  - If the user asks to manually refresh, sync, or update the current competitor table, choose `competitor_table_refresh`.
  - If the user asks to sync influencer-pool data or expand influencers from competitor products, choose `influencer_pool_sync`.
  - If the message contains a TikTok product URL and explicitly mentions competitor row or competitor URL, choose `competitor_row_by_url`.
  - If the message contains a TikTok product URL and asks to complete a single product without competitor-table semantics, choose `product_url_complete`.
  - If the user asks for FastMoss keyword search or product collection but does not specify competitor table or selection table, ask which target table to write to. Do not submit a task.

output_format:
  success: "request_id: <request_id>"
  failure: "任务提交失败：<short safe reason>"
  missing_input_examples:
    - 请提供要搜索的关键词。
    - 请确认写入目标表：TK竞品收集 还是 TK选品收集？

guardrails:
  - Do not submit a task unless the user explicitly asks to run, update, sync, complete, collect, search-and-write, or submit.
  - Do not route `选品表` requests to competitor workflows.
  - Do not route `竞品表` requests to selection workflows.
  - Do not use a generic keyword-search workflow when the target table is ambiguous.
  - Do not ask users for credentials, tokens, table IDs, browser profiles, Runtime DB, or deployment settings.
  - Do not print configuration values.
  - Do not expose cookies, tokens, env vars, stack traces, table IDs, or browser profile paths.
  - Do not run legacy leaf steps or troubleshooting wrappers.
  - Do not poll Runtime jobs after task submission.
  - Do not promise to report final results in this chat.
  - Do not include internal step counts, candidates, browser details, or worker details in the first reply.

edge_cases:
  - "Keyword search without keyword: ask only for the keyword."
  - "Keyword search without target table: ask whether to write to `TK竞品收集` or `TK选品收集`."
  - "Single-URL workflow with multiple URLs: ask for one URL."
  - "TikTok URL without table semantics: use `product_url_complete` only if the user asks to complete a product; otherwise ask for the intended workflow."
  - "Wrapper exits without `request_id`: treat as failed submission."
  - "Wrapper returns failed/error: return only the safe failure summary."
  - "Runtime / Feishu / FastMoss / browser unavailable: do not switch to another workflow."

final_checks:
  - Exactly one workflow was selected.
  - Required inputs were extracted or requested.
  - Defaults match the selected workflow.
  - Target table matches the selected workflow.
  - Formal workflow maps to a valid `task_code`.
  - Operational sub-intent maps to a valid `parent_task_code`.
  - The command emitted `__OPENCLAW_RESULT__`.
  - "Successful reply contains only `request_id: <request_id>`."
  - Failure reply uses `任务提交失败：<short safe reason>`.

examples:
  - user: 手动跑一次竞品采集
    intent: competitor_table_refresh
    reply: "request_id: <request_id>"
  - user: 帮我查询关键字 east egg 的 7日销量大于200的 TK 商品，写入 TK竞品收集
    intent: keyword_competitor_search
    inputs:
      search_keyword: east egg
      sales_7d_threshold: 200
      max_candidates: 20
    reply: "request_id: <request_id>"
  - user: 帮我按关键词 east egg 搜索 7日销量大于500 且价格大于10.99 的 TK 商品，写入 TK选品表
    intent: keyword_selection_search
    inputs:
      search_keyword: east egg
      sales_7d_threshold: 500
      price_range_max_threshold: 10.99
    reply: "request_id: <request_id>"
  - user: 补全TK选品表
    intent: selection_table_ingest
    reply: "request_id: <request_id>"
  - user: 达人池同步
    intent: influencer_pool_sync
    reply: "request_id: <request_id>"
  - user: 补全这个商品 https://www.tiktok.com/shop/pdp/123
    intent: product_url_complete
    inputs:
      product_url: https://www.tiktok.com/shop/pdp/123
    reply: "request_id: <request_id>"
  - user: 竞品表单行补全 https://www.tiktok.com/shop/pdp/123
    intent: competitor_row_by_url
    inputs:
      product_url: https://www.tiktok.com/shop/pdp/123
    reply: "request_id: <request_id>"

negative_activation_examples:
  - user: FastMoss 是什么？
    reason: concept question, no task submission requested.
  - user: 帮我分析这个 skill 的问题
    reason: skill review request, not a TikTok/Feishu task submission.
  - user: TikTok竞品分析一般怎么做？
    reason: strategy discussion, no current Feishu competitor workflow requested.
  - user: TK选品表字段怎么设计？
    reason: table-design discussion, not selection-table ingest or keyword-selection search.
  - user: 搜索 FastMoss 商品并写入飞书
    reason: target table is ambiguous. Ask whether to write to `TK竞品收集` or `TK选品收集`.

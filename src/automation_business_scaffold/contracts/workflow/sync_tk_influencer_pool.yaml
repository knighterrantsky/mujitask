schema_version: 1
workflow_origin: migrated_existing
workflow_code: sync_tk_influencer_pool
domain: tiktok
agent_artifact:
  skill_code: mujitask-tiktok-feishu-sync
  path: skills/mujitask-tiktok-feishu-sync
  status: legacy_skills_directory
task:
  code: sync_tk_influencer_pool
  module: automation_business_scaffold.domains.tiktok.tasks.sync_tk_influencer_pool
  exports:
    - SyncTKInfluencerPoolTask
workflow:
  module: automation_business_scaffold.domains.tiktok.workflows.sync_tk_influencer_pool
  definition_export: build_sync_tk_influencer_pool_definition
  runtime_export: build_sync_tk_influencer_pool_workflow
  exports:
    - SYNC_TK_INFLUENCER_POOL_DEFINITION
custom_logic:
  mappers:
    - code: influencer_pool_source_adapter
      module: automation_business_scaffold.domains.tiktok.mappers.feishu_influencer_source_mapper
      export: influencer_pool_source_adapter
  policies:
    - code: influencer_workflow_policies
      module: automation_business_scaffold.domains.tiktok.policies.workflow_policies
      exports:
        - influencer_idempotency_rules
        - influencer_timeout_rules
        - standard_watchdog_rules
        - notification_summary_policy
  projections:
    - code: influencer_pool_projection_mapper
      module: automation_business_scaffold.domains.tiktok.projections.feishu_influencer_projection
      export: influencer_pool_projection_mapper
    - code: competitor_influencer_status_projection_mapper
      module: automation_business_scaffold.domains.tiktok.projections.feishu_competitor_projection
      export: competitor_influencer_status_projection_mapper
outbox:
  job_code: task_completed_notification
  handler_code: outbox_dispatch
  capability:
    role: channel
    system: outbox
    module: automation_business_scaffold.capabilities.channels.outbox.message_dispatch_handler
    export: outbox_dispatch_handler
jobs:
  - code: feishu_table_read
    module: automation_business_scaffold.domains.tiktok.jobs.feishu_table_read
    handler_code: feishu_table_read
    capability:
      role: input_source
      system: feishu
      module: automation_business_scaffold.capabilities.input_sources.feishu.table_read_handler
      export: feishu_table_read_handler
    custom_logic_refs:
      mappers:
        - influencer_pool_source_adapter
  - code: fastmoss_product_fetch
    module: automation_business_scaffold.domains.tiktok.jobs.fastmoss_product_fetch
    handler_code: fastmoss_product_fetch
    capability:
      role: fact_source
      system: fastmoss
      module: automation_business_scaffold.capabilities.fact_sources.fastmoss.product_fetch_handler
      export: fastmoss_product_fetch_handler
  - code: fastmoss_creator_fetch
    module: automation_business_scaffold.domains.tiktok.jobs.fastmoss_creator_fetch
    handler_code: fastmoss_creator_fetch
    capability:
      role: fact_source
      system: fastmoss
      module: automation_business_scaffold.capabilities.fact_sources.fastmoss.creator_fetch_handler
      export: fastmoss_creator_fetch_handler
  - code: fact_bundle_upsert
    module: automation_business_scaffold.domains.tiktok.jobs.fact_bundle_upsert
    handler_code: fact_bundle_upsert
    capability:
      role: persistence
      system: database
      module: automation_business_scaffold.capabilities.persistence.database.fact_bundle_upsert_handler
      export: fact_bundle_upsert_handler
  - code: feishu_table_write
    module: automation_business_scaffold.domains.tiktok.jobs.feishu_table_write
    handler_code: feishu_table_write
    capability:
      role: channel
      system: feishu
      module: automation_business_scaffold.capabilities.channels.feishu.table_write_handler
      export: feishu_table_write_handler
    custom_logic_refs:
      projections:
        - influencer_pool_projection_mapper
        - competitor_influencer_status_projection_mapper
  - code: task_completed_notification
    module: automation_business_scaffold.domains.tiktok.jobs.task_completed_notification
    handler_code: outbox_dispatch
    capability:
      role: channel
      system: outbox
      module: automation_business_scaffold.capabilities.channels.outbox.message_dispatch_handler
      export: outbox_dispatch_handler

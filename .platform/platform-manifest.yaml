# Platform-managed: keep this file aligned with the pinned automation-framework dependency.
repo_role: business_scaffold
scaffold_version: "0.1.0"
framework_docs_source: "automation-framework package or framework repository"
default_change_mode: "business_feature"
path_assumptions:
  sibling_framework_repo_required: false
  sibling_framework_repo_optional_hint: "../automation-framework"
installation_modes:
  standard:
    description: "Install framework from the pinned git dependency in pyproject.toml."
  workspace_local_override:
    description: "Optional platform-maintainer mode using pip install -e ../automation-framework."
allowed_framework_imports:
  - "automation_framework.agent.server"
  - "automation_framework.core"
  - "automation_framework.runtime"
protected_paths:
  - ".platform/**"
  - "AGENTS.md"
  - "src/automation_business_scaffold/agent.py"
  - "src/automation_business_scaffold/registry.py"
  - "tests/test_agent.py"
  - "tests/test_framework_dependency.py"
business_editable_paths:
  - "README.md"
  - "docs/README.md"
  - "docs/arch/**"
  - "docs/domains/**"
  - "docs/dev/**"
  - "docs/business/**"
  - "contracts/**"
  - "tests/**"
  - "src/automation_business_scaffold/config.py"
  - "src/automation_business_scaffold/domains/**"
  - "src/automation_business_scaffold/capabilities/**"
  - "src/automation_business_scaffold/control_plane/**"
  - "src/automation_business_scaffold/contracts/**"
  - "src/automation_business_scaffold/models/**"
  - "src/automation_business_scaffold/validators/**"
  - "docs/ops/**"
  - "docs/reference/**"
legacy_reference_paths: []
legacy_reference_rule: "No legacy reference paths remain. docs/business/** is the current customer requirements and business acceptance source, not legacy reference."
demo_task_name: "source_to_target_publish_demo"
demo_workflow_id: "source_to_target_publish_demo_v1"

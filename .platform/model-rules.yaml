# Platform-managed: these rules are the default operating instructions for Codex in business work.
startup_read_order:
  - ".platform/platform-manifest.yaml"
  - ".platform/model-rules.yaml"
  - "AGENTS.md"
  - "README.md"
  - "docs/README.md"
default_change_mode: "business_feature"
environment_assumptions:
  standard_mode:
    description: "Assume only the current scaffold repo exists locally."
  local_framework_override:
    description: "A sibling ../automation-framework checkout is optional and only for platform-maintainer validation."
change_modes:
  business_feature:
    description: "Default mode for normal bounded business development during rewrite."
    may_edit:
      - "README.md"
      - "docs/README.md"
      - "docs/arch/**"
      - "docs/domains/**"
      - "docs/dev/**"
      - "contracts/**"
      - "tests/**"
      - "src/automation_business_scaffold/config.py"
      - "src/automation_business_scaffold/domains/**"
      - "src/automation_business_scaffold/capabilities/**"
      - "src/automation_business_scaffold/control_plane/**"
      - "src/automation_business_scaffold/contracts/**"
      - "src/automation_business_scaffold/models/**"
      - "src/automation_business_scaffold/validators/**"
      - "docs/ops/**"
      - "docs/reference/**"
    must_not_edit:
      - ".platform/**"
      - "AGENTS.md"
      - "src/automation_business_scaffold/business/**"
      - "src/automation_business_scaffold/agent.py"
      - "src/automation_business_scaffold/registry.py"
      - "tests/test_agent.py"
      - "tests/test_framework_dependency.py"
  legacy_reference:
    description: "Read-only reference mode for old business implementation and original business requirements."
    readable:
      - "src/automation_business_scaffold/business/**"
      - "docs/business/**"
    rule: "Read-only reference unless the user explicitly asks for legacy cleanup or customer requirement changes."
  platform_upgrade:
    description: "Only use when updating framework dependency metadata or platform-managed shell files."
framework_rules:
  docs_source: "Read framework public API, contract, and migration guidance from the installed automation-framework package or the framework repository."
  allowed_import_modules:
    - "automation_framework.agent.server"
    - "automation_framework.core"
    - "automation_framework.runtime"
  forbidden_import_prefixes:
    - "automation_framework.browser"
    - "automation_framework.clients"
    - "automation_framework.runtime.engine"
    - "automation_framework.runtime.validators"
    - "automation_framework.selftest"
workflow_rules:
  default_task_base: "BaseWorkflowTask"
  workflow_draft_is_review_only: true
  execute_via_workflow_spec: true

name: validate-skills

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-skills:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate generated skill files
        run: uv run --extra dev python tools/render_skill.py --check

      - name: Validate skill contract
        run: uv run --extra dev python tools/validate_skill.py

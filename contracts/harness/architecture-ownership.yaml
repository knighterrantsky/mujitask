schema_version: 1
roadmap_status: stable

owners:
  business_flow:
    paths:
      - src/automation_business_scaffold/domains/**/flows/**
    allowed_helper_like_paths:
      - path: src/automation_business_scaffold/domains/tiktok/flows/search_keyword_competitor_products/orchestrator.py
        reason: Required workflow package entrypoint for stage dispatch and public import compatibility; stage logic remains in stages/.
      - path: src/automation_business_scaffold/domains/tiktok/flows/refresh_current_competitor_table/orchestrator.py
        reason: Required workflow package entrypoint for stage dispatch and public import compatibility; stage logic remains in stages/.
      - path: src/automation_business_scaffold/domains/tiktok/flows/sync_tk_influencer_pool/orchestrator.py
        reason: Required workflow package entrypoint for stage dispatch and public import compatibility; stage logic remains in stages/.
      - path: src/automation_business_scaffold/domains/tiktok/flows/tiktok_fastmoss_product_ingest/orchestrator.py
        reason: Required workflow package entrypoint for stage dispatch and public import compatibility; stage logic remains in stages/.
      - path: src/automation_business_scaffold/domains/tiktok/flows/refresh_current_competitor_table/stages/dispatch_product_collection.py
        reason: Stable workflow stage module for dispatch_product_collection; it owns row fan-out for the existing workflow stage rather than a generic helper abstraction.
      - path: src/automation_business_scaffold/domains/amazon/flows/refresh_amazon_product_row_by_asin/orchestrator.py
        reason: Required Amazon single-row workflow package entrypoint called only by the registered Runtime facade; it owns four-stage transitions and compact child payloads, while handlers retain all browser, Fact DB, object-storage, and Feishu side effects.
      - path: src/automation_business_scaffold/domains/amazon/flows/amazon_product_row_persist/orchestrator.py
        reason: Required Amazon row persistence package entrypoint that serially composes existing media, fact persistence, projection, and Feishu handlers through dispatch boundaries, preserves media-partial retry semantics, and does not create a generic helper owner.
    responsibilities:
      - decide what business targets to collect
      - decide business filtering and row follow-up strategy
      - decide which projection mapper to use
      - own Amazon single-row stage transitions, child dispatch keys, and summary gating without directly executing handler side effects
      - decide whether a workflow enters fastmoss_security_browser_fallback and whether to retry the original FastMoss handler after browser resolution
    forbidden:
      - own durable fact persistence
      - own MinIO upload implementation
      - own Feishu low-level writing
      - create generic fact collection helper without contract

  fact_source_handler:
    paths:
      - src/automation_business_scaffold/capabilities/fact_sources/**
    responsibilities:
      - collect raw facts from TikTok/FastMoss or other external sources
      - return normalized raw result envelope
      - classify FastMoss MSG_SAFE_0001 as fallback_required with a redacted verification_request instead of generic fastmoss_http_failure
    forbidden:
      - decide Feishu business field projection
      - own workflow-level business filtering
      - duplicate FastMoss session/cookie recovery, login refresh, or external-login conflict policy

  browser_security_resolve:
    paths:
      - src/automation_business_scaffold/capabilities/browser/**
    responsibilities:
      - own browser_worker handlers that resolve provider security checks requiring a real browser
      - implement FastMoss security browser resolve behavior such as replaying the original failed FastMoss API request, solving the slider, and verifying MSG_SAFE_0001 is gone
      - return only redacted browser fallback evidence and cookie cache metadata
    forbidden:
      - decide keyword candidate filtering or max_candidates behavior
      - write Feishu business projections
      - store raw cookie values in handler summary, logs, or task result

  fastmoss_session_cookie_cache:
    paths:
      - src/automation_business_scaffold/infrastructure/fastmoss/**
      - src/automation_business_scaffold/infrastructure/runtime/**
    responsibilities:
      - own FastMoss cookie cache context, load/save semantics, and redacted cache status
      - own FastMoss platform session/cookie recovery, login refresh persistence, and external-login conflict classification
      - persist browser-exported FastMoss cookies into fastmoss_session_cookie_cache
      - expose cache metadata such as cookie_count, has_fd_tk, fd_tk_digest, and expires_at without exposing cookie values
    forbidden:
      - decide whether a workflow should enter fastmoss_security_browser_fallback
      - decide search business filters or Feishu writeback fields
      - treat cookies as an API token or log cookie values

  media_asset_sync:
    paths:
      - src/automation_business_scaffold/capabilities/media/**
    responsibilities:
      - download referenced media
      - upload/materialize media into object storage
      - return object_key/remote_uri metadata
    forbidden:
      - decide whether a product is business-worthy
      - decide Feishu writeback fields

  mapper:
    paths:
      - src/automation_business_scaffold/domains/**/mappers/**
      - src/automation_business_scaffold/capabilities/**/mappers/**
    responsibilities:
      - map accepted raw payload into fact payload
    forbidden:
      - perform network fetch
      - perform MinIO upload
      - perform Feishu writeback

  fact_ingestion:
    paths:
      - src/automation_business_scaffold/capabilities/**/fact*
      - src/automation_business_scaffold/control_plane/**
    responsibilities:
      - upsert fact entities, snapshots, relations, media assets, raw audit
    forbidden:
      - decide business selection criteria
      - decide Feishu field projection

  projection_mapper:
    paths:
      - src/automation_business_scaffold/domains/**/projections/**
    responsibilities:
      - map fact/business result to Feishu fields
    forbidden:
      - collect external facts
      - upload media
      - upsert Fact DB

  amazon_browser_capture:
    paths:
      - src/automation_business_scaffold/capabilities/browser/amazon/**
      - src/automation_business_scaffold/capabilities/browser/amazon_product_fetch_handler.py
    responsibilities:
      - normalize Amazon US ASIN identity and canonical URL for browser collection
      - visit one Amazon product page through the existing browser bridge
      - parse embedded data, same-origin page responses, semantic DOM, and controlled text blocks in precedence order
      - persist complete capture evidence to object storage and return compact artifact references
    forbidden:
      - write Fact DB
      - write Feishu business projections
      - materialize long-lived product media
      - bypass captcha, access blocks, or provider security policy

  amazon_fact_persistence:
    paths:
      - src/automation_business_scaffold/infrastructure/schemas/amazon_fact_schema.py
      - src/automation_business_scaffold/infrastructure/facts/amazon_fact_store.py
      - src/automation_business_scaffold/capabilities/persistence/database/amazon_product_fact_upsert_handler.py
    responsibilities:
      - define Amazon fact tables for migration and test bootstrap consumers
      - upsert Amazon products, snapshots, offers, variants, BSR, media relations, raw capture indexes, and Feishu bindings
      - enforce marketplace plus ASIN identity and per-run idempotency keys
    forbidden:
      - decide Feishu fields
      - visit or parse Amazon pages
      - decide workflow stage transitions
      - execute production DDL from daemon or worker paths

  rate_limit:
    paths:
      - src/automation_business_scaffold/infrastructure/rate_limit/**
      - src/automation_business_scaffold/infrastructure/*/**
    responsibilities:
      - own external API request pacing primitives and provider client integration
      - normalize configurable min/max randomized delay values
      - emit request pacing evidence without secrets
    forbidden:
      - decide business target selection
      - decide workflow stage transitions
      - encode provider business field mappings

legacy_reference_only: []

      - search_keyword_selection_products flow implementation must be a same-name package with stage modules anchored by stable stage_code values.
      - Task and workflow modules must remain thin shells and keep stable task_code/workflow_code/stage_code/job_code/handler_code values.
      - Selection keyword flow package must not import concrete provider clients or infrastructure runtime persistence modules directly.
      - RuntimeStore constructor must not execute schema DDL; bootstrap must be explicit.
      - RuntimeStore must delegate at least task request status reads, outbox create/load, resource lease cleanup, and watchdog row scans to repository/query modules.


    completion_rules:
      - Fact migration requires an explicit migration-user URL, owns an isolated fact_alembic_version graph, and creates only the nine governed amazon_* tables and indexes; production workers do not execute DDL.
      - The validated shared Fact runtime role receives only schema usage, governed TikTok and Amazon Fact table DML, and Fact version-table SELECT privileges; it receives no Runtime table privileges.
      - Amazon identity is unique by marketplace_code plus asin and does not add cross-platform foreign keys.
      - Product, snapshot, offer, variant, BSR, media, raw capture, and Feishu binding upserts are independently idempotent.

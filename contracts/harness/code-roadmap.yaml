        - tests/test_runtime_product_ingest_module.py
      commands:
        - uv run --extra dev pytest tests/test_tiktok_fastmoss_product_ingest.py tests/test_runtime_phase2_ingest.py tests/test_runtime_product_ingest_module.py
    completion_rules:
      - Must preserve request-first/browser-fallback workflow contract.
      - Full e2e may remain blocked by active rewrite, but complete claim requires gate pass.

      - src/automation_business_scaffold/domains/**
      - src/automation_business_scaffold/capabilities/**
      - src/automation_business_scaffold/control_plane/**
    done_gate:
      tests:
        - tests/test_openclaw_deploy_utils.py
        - tests/test_harness_code_roadmap.py
        - tests/test_completion_claim_gate.py
      commands:
        - bash -n scripts/deploy/macos/deploy.sh scripts/execution_control/run_alembic_upgrade.sh scripts/execution_control/install_launch_agents.sh
        - uv run --extra dev pytest tests/test_openclaw_deploy_utils.py tests/test_harness_code_roadmap.py tests/test_completion_claim_gate.py
    completion_rules:
      - Initial deployment and update deployment must run Alembic migration before launchd restart.
      - macOS deploy.sh must execute run_alembic_upgrade.sh before install_launch_agents.sh.
      - install_launch_agents.sh schema bootstrap is only a local convenience fallback, not a replacement for migration.


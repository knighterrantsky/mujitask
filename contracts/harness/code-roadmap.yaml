schema_version: 1
roadmap_status: stable

source_of_truth:
  project_structure: docs/arch/project-structure-contract.md
  completion_gate: scripts/harness/claim_done.py

canonical_runtime_owners:
  - src/automation_business_scaffold/domains/**
  - src/automation_business_scaffold/capabilities/**
  - src/automation_business_scaffold/control_plane/**
  - src/automation_business_scaffold/contracts/**
  - contracts/**

legacy_reference_only: []

features:
  - feature_code: harness_completion_claim_gate
    status: complete
    default_context:
      - AGENTS.md
      - docs/arch/system-architecture-design.md
      - contracts/README.md
      - contracts/harness/code-roadmap.yaml
      - scripts/harness/claim_done.py
      - tests/test_harness_code_roadmap.py
      - tests/test_completion_claim_gate.py
    source_contracts:
      - AGENTS.md
      - docs/arch/system-architecture-design.md
      - contracts/harness/code-roadmap.yaml
    allowed_paths:
      - AGENTS.md
      - docs/arch/system-architecture-design.md
      - contracts/README.md
      - contracts/harness/**
      - scripts/harness/**
      - tests/test_harness_code_roadmap.py
      - tests/test_completion_claim_gate.py
      - tests/test_project_structure_contract.py
    forbidden_paths:
      - src/automation_business_scaffold/domains/**
      - src/automation_business_scaffold/capabilities/**
      - src/automation_business_scaffold/control_plane/**
    done_gate:
      tests:
        - tests/test_harness_code_roadmap.py
        - tests/test_completion_claim_gate.py
      commands:
        - uv run --extra dev pytest tests/test_harness_code_roadmap.py tests/test_completion_claim_gate.py
    completion_rules:
      - claim_done.py must return claim=complete with no failed_checks.
      - AGENTS.md must contain Completion Claim Gate and Stop Protocol.
      - Roadmap paths and done gates must be statically checkable.

  - feature_code: architecture_drift_gate
    status: complete
    feature_type: repository_governance
    requires_architecture_delta_gate: true
    default_context:
      - AGENTS.md
      - docs/arch/system-architecture-design.md
      - contracts/harness/code-roadmap.yaml
      - contracts/harness/architecture-ownership.yaml
      - contracts/facts/product-fact-collection.yaml
      - scripts/harness/validate_architecture_delta.py
      - scripts/harness/claim_done.py
    source_contracts:
      - contracts/harness/architecture-ownership.yaml
      - contracts/facts/product-fact-collection.yaml
    allowed_paths:
      - AGENTS.md
      - contracts/harness/**
      - contracts/facts/**
      - scripts/harness/**
      - tests/test_architecture_delta_gate.py
      - tests/test_completion_claim_gate.py
    forbidden_paths:
      - src/automation_business_scaffold/domains/**
      - src/automation_business_scaffold/capabilities/**
      - src/automation_business_scaffold/control_plane/**
    done_gate:
      tests:
        - tests/test_architecture_delta_gate.py
        - tests/test_completion_claim_gate.py
      commands:
        - uv run --extra dev pytest tests/test_architecture_delta_gate.py tests/test_completion_claim_gate.py
    completion_rules:
      - New helper-like abstraction must fail unless explicitly allowed by contract.
      - Product fact collection must be governed by contract before implementation.

  - feature_code: skill_contract_gate
    status: complete
    feature_type: repository_governance
    default_context:
      - contracts/skill_contract.md
      - contracts/skill_spec.schema.json
      - contracts/agents/business-agent-bindings.yaml
      - prompts/generate_skill_spec.md
      - tools/render_skill.py
      - tools/validate_skill.py
      - skills/mujitask-tiktok-feishu-sync/skill.spec.yaml
      - skills/mujitask-tiktok-feishu-sync/examples.eval.yaml
      - skills/mujitask-tiktok-feishu-sync/SKILL.md
      - skills/mujitask-amazon-feishu-sync/skill.spec.yaml
      - skills/mujitask-amazon-feishu-sync/examples.eval.yaml
      - skills/mujitask-amazon-feishu-sync/SKILL.md
      - tests/test_skill_contract.py
      - tests/test_business_agent_isolation_contract.py
      - .github/workflows/validate-skills.yml
    source_contracts:
      - contracts/skill_contract.md
      - contracts/skill_spec.schema.json
      - contracts/agents/business-agent-bindings.yaml
    allowed_paths:
      - contracts/skill_contract.md
      - contracts/skill_spec.schema.json
      - contracts/agents/**
      - contracts/README.md
      - contracts/harness/code-roadmap.yaml
      - prompts/generate_skill_spec.md
      - tools/render_skill.py
      - tools/validate_skill.py
      - skills/**
      - tests/test_skill_contract.py
      - tests/test_business_agent_isolation_contract.py
      - tests/test_amazon_openclaw_skill.py
      - tests/test_project_structure_contract.py
      - .github/workflows/validate-skills.yml
    forbidden_paths:
      - src/automation_business_scaffold/domains/**
      - src/automation_business_scaffold/capabilities/**
      - src/automation_business_scaffold/control_plane/**
    done_gate:
      tests:
        - tests/test_skill_contract.py
        - tests/test_business_agent_isolation_contract.py
        - tests/test_amazon_openclaw_skill.py
        - tests/test_project_structure_contract.py
      commands:
        - uv run --extra dev python tools/render_skill.py --check
        - uv run --extra dev python tools/validate_skill.py
        - uv run --extra dev pytest tests/test_skill_contract.py tests/test_business_agent_isolation_contract.py tests/test_amazon_openclaw_skill.py tests/test_project_structure_contract.py
    completion_rules:
      - Every SKILL.md under skills/ must have a sibling skill.spec.yaml.
      - SKILL.md must be generated by tools/render_skill.py and remain byte-for-byte current.
      - Side-effect skills must declare intents, extracted inputs, negative examples, failure handling, and fixed output format.
      - Amazon and TikTok use distinct skill bundles, OpenClaw agents/workspaces, and Feishu conversation routes; Amazon validates the deployment-configured Feishu account id instead of pinning a local alias, while Runtime infrastructure remains governed and shared.
      - CI must run the same render and validation gates.

  - feature_code: git_branch_protocol_gate
    status: complete
    feature_type: repository_governance
    default_context:
      - AGENTS.md
      - docs/dev/git-workflow.md
      - docs/ops/release-flow.md
      - contracts/harness/code-roadmap.yaml
      - tests/test_git_branch_protocol.py
      - tests/test_harness_code_roadmap.py
    source_contracts:

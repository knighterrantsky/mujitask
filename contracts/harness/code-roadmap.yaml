        - uv run --extra dev pytest tests/test_feishu_common_handlers.py tests/test_tiktok_product_request_fetch_handler.py tests/test_tiktok_product_browser_fetch_handler.py tests/test_fastmoss_fact_mappers.py tests/test_tk_fact_store.py tests/test_runtime_store.py tests/test_browser_fallback_boundary.py
        - uv run --extra dev pytest tests/test_harness_code_roadmap.py tests/test_git_branch_protocol.py
    completion_rules:
      - RuntimeStore and TKFactStore constructors must not execute CREATE/ALTER/DROP/CREATE INDEX DDL.
      - Runtime and Fact DB bootstrap DDL must live under infrastructure/schemas and be invoked explicitly.
      - Feishu input source capabilities must not own TikTok table business field semantics.
      - TikTok browser code must live under capabilities/browser, not infrastructure/tiktok.
      - FastMoss raw payload to fact bundle mapping must live under capabilities/fact_sources/fastmoss/mappers.
      - This phase must not modify domains/tiktok/flows or slim long flow files.


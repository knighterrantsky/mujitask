schema_version: 1
contract_type: feishu_field_contract
table_code: tk_selection
feishu_table_name: TK选品收集
owner: business

source_adapter: selection_table_source_adapter
projection_mapper: selection_table_projection_mapper

business_truth:
  overview: docs/business/business-requirements.md
  reference:
    - docs/business/feishu-five-table-relationship-analysis.md
  requirement_note: 当前表字段已作为业务事实沉淀；独立选品扩展需求仍在 backlog，不能从该字段契约反推未确认的新业务规则。
arch_truth:
  - docs/arch/workflow-selection-analysis-design.md
  - docs/arch/handler-contract-design.md

identity_fields:
  - 商品ID
  - 商品链接

auto_maintained_fields:
  - 商品ID
  - 商品链接
  - 记录日期

pending_policy:
  selection_table_mode_requires:
    - selection_table_ref
    - selection_record_id
  direct_product_mode_uses_payload_identity: true
  skip_when_product_status:
    - 已下架/区域不可售

fields:
  - display_name: 商品ID
    canonical_name: product_id
    role: identity
    participates_in_dedupe: true
    update_policy: fill_missing_or_refresh_identity
    overwrite_policy: system_may_write_identity
    source_of_truth: tiktok_product_identity.product_id
    write_target: feishu.TK选品收集.商品ID

  - display_name: 商品链接
    canonical_name: product_url
    role: identity
    participates_in_dedupe: true
    update_policy: fill_missing_or_refresh_identity
    overwrite_policy: system_may_write_normalized_link
    source_of_truth: tiktok_product_identity.normalized_product_url
    write_target: feishu.TK选品收集.商品链接

  - display_name: 商品状态
    canonical_name: product_status
    role: system_status
    update_policy: read_for_skip_policy
    overwrite_policy: do_not_write_currently
    source_of_truth: feishu.TK选品收集.商品状态
    write_target: feishu.TK选品收集.商品状态

  - display_name: 记录日期
    canonical_name: recorded_date
    role: auto_maintained
    update_policy: write_when_selection_projection_runs
    overwrite_policy: system_may_refresh_on_successful_writeback
    source_of_truth: workflow_writeback_date
    write_target: feishu.TK选品收集.记录日期

  - display_name: 文本
    canonical_name: text_marker
    role: customer_or_temporary_marker
    update_policy: never_write
    write_target: feishu.TK选品收集.文本

  - display_name: 关键词
    canonical_name: keyword
    role: seed_context
    update_policy: preserve_existing
    overwrite_policy: do_not_overwrite_non_empty
    write_target: feishu.TK选品收集.关键词

  - display_name: 店铺名称
    canonical_name: shop_name
    role: research_material
    update_policy: not_written_by_current_ingest
    write_target: feishu.TK选品收集.店铺名称

  - display_name: 商品标题
    canonical_name: product_title
    role: research_material
    update_policy: not_written_by_current_ingest
    write_target: feishu.TK选品收集.商品标题

  - display_name: 商品当前价格
    canonical_name: product_current_price
    role: research_metric
    update_policy: not_written_by_current_ingest
    write_target: feishu.TK选品收集.商品当前价格

  - display_name: 商品评论数
    canonical_name: product_review_count
    role: research_metric
    update_policy: not_written_by_current_ingest
    write_target: feishu.TK选品收集.商品评论数

  - display_name: 商品描述
    canonical_name: product_description
    role: research_material
    update_policy: not_written_by_current_ingest
    write_target: feishu.TK选品收集.商品描述

  - display_name: 商品评分
    canonical_name: product_rating
    role: research_metric
    update_policy: not_written_by_current_ingest
    write_target: feishu.TK选品收集.商品评分

  - display_name: 商品主图
    canonical_name: product_main_image
    role: research_material
    update_policy: not_written_by_current_ingest
    write_target: feishu.TK选品收集.商品主图

  - display_name: 商品侧边栏图片
    canonical_name: product_side_images
    role: research_material
    update_policy: not_written_by_current_ingest
    write_target: feishu.TK选品收集.商品侧边栏图片

  - display_name: 出单种类占比截图
    canonical_name: order_type_ratio_screenshot
    role: research_material
    update_policy: not_written_by_current_ingest
    write_target: feishu.TK选品收集.出单种类占比截图

  - display_name: 今年总销量
    canonical_name: current_year_sales
    role: research_metric
    update_policy: not_written_by_current_ingest
    write_target: feishu.TK选品收集.今年总销量

  - display_name: 今年总销量趋势截图
    canonical_name: current_year_sales_trend_screenshot
    role: research_material
    update_policy: not_written_by_current_ingest
    write_target: feishu.TK选品收集.今年总销量趋势截图

  - display_name: SKU销量占比分析
    canonical_name: sku_sales_ratio_analysis
    role: research_material
    update_policy: not_written_by_current_ingest
    write_target: feishu.TK选品收集.SKU销量占比分析

  - display_name: 父体规格
    canonical_name: parent_sku_spec
    role: research_material
    update_policy: not_written_by_current_ingest
    write_target: feishu.TK选品收集.父体规格

  - display_name: 父体图片
    canonical_name: parent_sku_image
    role: research_material
    update_policy: not_written_by_current_ingest
    write_target: feishu.TK选品收集.父体图片

  - display_name: 差评整理
    canonical_name: negative_review_summary
    role: research_material
    update_policy: not_written_by_current_ingest
    write_target: feishu.TK选品收集.差评整理

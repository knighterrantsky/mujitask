schema_version: 1
contract_type: product_fact_collection
status: active_contract

principles:
  - product facts are independent from Feishu business writeback
  - every persisted product media fact must be materialized to object storage before being persisted as fact media
  - Amazon media materialization may persist a validated subset of observed media; missing observed media makes the handler partial_success, while unexpected or duplicate media remains invalid
  - formal workflows that use fact_bundle_upsert or media_asset_sync must declare requires_fact_db=true and requires_object_storage=true
  - missing Fact DB or object storage configuration must fail fast during submit or handler execution
  - formal skill payloads carry business inputs plus explicitly governed secret-free routing snapshots only; project runtime config resolves Runtime DB, Fact DB, object storage, browser profiles, and credentials
  - business flows decide what products to collect and which projection mapper to use
  - fact collection does not decide Feishu fields
  - Feishu projection does not decide fact persistence
  - waiting row job is the only pending row-level fallback fact; task_execution is the browser task fact; API worker row pipelines may only emit a business browser request and continue after executor/runtime writes browser output references or cookie-cache evidence back to the original row job
  - fallback_required is a compatibility handler signal, not a Runtime DB lifecycle status and not a final row result
  - row-level product collection workflows default to row_pipeline_concurrency=1 unless a workflow contract explicitly declares bounded concurrency, FIFO/lane, idempotency, and summary gates
  - browser-runloop must execute browser handlers through child_process supervision, not inline supervision, so Sync Playwright never runs inside a host asyncio loop
  - browser artifacts created during fallback must be persisted to object storage and indexed by artifact_object before the row job treats them as available
  - FastMoss security fallback persists cookie values only to fastmoss_session_cookie_cache; parent job payload/result may carry only redacted cookie cache metadata
  - Feishu table-read raw rows, raw field snapshots, attachment envelopes, and source field evidence are artifact/object-storage evidence; Runtime DB may carry only raw_snapshot_ref, raw_snapshot_artifacts metadata, empty_row_records, counts, candidate keys, and compact source_rows/source_fields

required_pipeline_roles:
  - fact_source_handler
  - browser_fallback_task_execution
  - media_asset_sync
  - mapper
  - fact_bundle_upsert

business_job_usage:
  tiktok_fastmoss_product_ingest:
    - selection_row_refresh is the row-level product fact collection boundary for TK selection table rows; it may call TikTok request, media_asset_sync, FastMoss fetch, fact_bundle_upsert, and Feishu writeback in a single serial row pipeline.
    - when selection_row_refresh needs TikTok browser fetch or FastMoss security browser resolve, it must emit a business browser request with browser_fallback_payload; executor/runtime owns task_execution scheduling, waits for browser-runloop completion, writes browser output refs, cookie-cache metadata, or failure evidence back to the original row job, then lets the original row pipeline consume browser output or retry the original FastMoss stage before media/fact persistence continues.
    - keyword selection row refresh must preserve the row-level cursor: one successful seed row may be active by default, fallback_required is not a Runtime DB status or final row status, and the next seed row cannot be dispatched until the current row has status=finished plus result_status after any browser fallback.
    - TikTok browser fetch may substitute the current TikTok collection stage output by writing normalized_product_result and artifact refs to task_execution.result_json and artifact_object.
    - FastMoss security browser resolve may only unblock the original FastMoss API stage by persisting fastmoss_session_cookie_cache and returning redacted metadata; the original handler must read cookie cache and retry the original request once.
    - when TikTok request fetch requires browser fallback but source_context already contains the complete selection-row product presentation fields required by Feishu writeback, selection_row_refresh may reuse those source fields as the normalized_product_result so FastMoss collection, media sync, fact_bundle_upsert, and Feishu projection can continue.
    - when TikTok request fetch requires browser fallback and source_context does not contain complete product presentation fields, selection_row_refresh may continue a FastMoss-only backfill using product identity, skip TikTok media/chart projection, write only FastMoss-owned fields, and report row_status=partial_success; it must not treat this as resolved TikTok browser fallback or write blank TikTok presentation fields.
    - fact_bundle_upsert must resolve Fact DB persistence from project runtime config or an explicit test-only submit override; missing configuration is a failed configuration state, not dry_run success.
    - media_asset_sync must resolve non-local object storage configuration from project runtime config or an explicit test-only submit override before product media is considered persisted; missing configuration or provider=local is a failed configuration state, not linked_local success.
    - unavailable/off-shelf/region-unavailable products are terminal product facts; selection_row_refresh must still persist the terminal fact bundle, but must skip media_asset_sync, FastMoss fetch, and chart-render writeback gates before Feishu terminal status projection.
    - writeback_enabled only controls Feishu projection writes and must not disable product fact collection or Fact DB persistence.
    - feishu_table_read for selection rows must persist full raw_rows/raw_rows_all to artifact/object storage when snapshot_policy.store_raw_rows=true; Runtime DB result_json must not inline full Feishu raw rows, raw source_fields, attachment envelopes, or blob-like fields, and may only pass compact source_rows plus raw_snapshot_ref/raw_snapshot_artifacts.
    - selection_row_refresh Runtime DB result_json must remain a small structured handoff for downstream stages and summary; full normalized product payloads, fact bundles, raw FastMoss/TikTok responses, full media sync payloads, and full Feishu write records belong in Fact DB or artifact/object storage and must not be embedded in runtime result_json.
  refresh_current_competitor_table:
    - competitor_row_refresh is the row-level product fact collection boundary for TK competitor table rows; it may call TikTok request, media_asset_sync, FastMoss fetch, fact_bundle_upsert, and Feishu writeback in a single serial row pipeline.
    - when competitor_row_refresh needs TikTok browser fetch or FastMoss security browser resolve, it must emit a business browser request with browser_fallback_payload; executor/runtime owns task_execution scheduling, waits for browser-runloop completion, writes browser output refs, cookie-cache metadata, or failure evidence back to the original row job, then lets the original row pipeline consume browser output or retry the original FastMoss stage before media/fact persistence continues.
    - TikTok browser fetch may substitute the current TikTok collection stage output; FastMoss security browser resolve may only persist fastmoss_session_cookie_cache and unblock one retry of the original FastMoss API stage.
    - feishu_table_read for competitor rows must persist full raw_rows/raw_rows_all to artifact/object storage when snapshot_policy.store_raw_rows=true; Runtime DB result_json must not inline full Feishu raw rows, raw source_fields, attachment envelopes, or blob-like fields, and may only pass compact source_rows plus raw_snapshot_ref/raw_snapshot_artifacts.
    - competitor_row_refresh Runtime DB result_json must remain a small structured handoff for downstream stages and summary; full normalized product payloads, fact bundles, raw FastMoss/TikTok responses, full media sync payloads, and full Feishu write records belong in Fact DB or artifact/object storage and must not be embedded in runtime result_json.
  sync_tk_influencer_pool:
    - product_creator_discovery may emit product fact bundles from one competitor product discovery job, but it must not persist product media directly.
    - product_creator_discovery Runtime DB result_json must remain a compact fan-out handoff containing only normalized creator candidates, product hit context, product fact summary, and raw response refs; full product fact bundles, raw FastMoss responses, SKU metric snapshots, HTML/blob payloads, and media bodies belong in Fact DB or artifact/object storage and must not be embedded in Runtime DB result_json.
    - product/video discovery uses product-video relations for SKU/product membership; video playback metrics from FastMoss video overview must be persisted as video_metric_snapshots, not as product-video relation fields or video master fields.
    - influencer_creator_sync may call fact_bundle_upsert and media_asset_sync internally for one unique creator; product media facts still follow the same object storage materialization rules.
    - influencer_creator_sync must only materialize creator avatar media; influencer pool product image projection should reuse source_product_images from the matched competitor product context, and must not download shop images or non-matched creator goods images during creator sync.
    - influencer_creator_sync must merge influencer pool source_product_images by unique matched product_id within one creator write, so multiple matched products create/append a Feishu attachment array while duplicate creator-product hits do not duplicate product images.
    - influencer_creator_sync must treat first-created Fact DB creator-product relations as the Feishu related-product-sales delta; Feishu influencer pool updates must read existing 关联商品销量 and add the delta instead of overwriting it, while new influencer rows may write the current matched-product sales total.
    - influencer_creator_sync Runtime DB result_json must remain a small structured handoff for downstream stages and summary; full fact bundles, raw FastMoss responses, full media sync payloads, and full Feishu write records belong in Fact DB or artifact/object storage and must not be embedded in runtime result_json.
    - influencer_creator_sync may persist per-step timing diagnostics in handler summary/result for creator_fetch, media_asset_sync, fact_bundle_upsert, influencer_pool_write, product_status_reconcile, and total duration; these diagnostics are observational metadata only and must not alter fact persistence, media materialization, Feishu projection, or workflow status semantics.

platform_contracts:
  amazon_us:
    workflow_code: refresh_amazon_product_row_by_asin
    marketplace_code: US
    identity_key:
      - marketplace_code
      - asin
    fact_tables:
      - amazon_products
      - amazon_product_snapshots
      - amazon_offer_snapshots
      - amazon_product_variants
      - amazon_bsr_snapshots
      - amazon_media_assets
      - amazon_product_media_assets
      - amazon_raw_captures
      - amazon_feishu_bindings
    object_prefixes:
      runtime_evidence: <env>/runs/<run_id>/amazon/<asin>/
      raw_capture: <env>/raw-captures/amazon/us/<asin>/
      product_media: <env>/product-media/amazon/us/<asin>/
    runtime_db_schema_change: false
    cross_platform_foreign_keys: false
    fact_database_policy: same_fact_database_instance_with_isolated_amazon_tables
    object_storage_policy: reuse_configured_bucket_with_isolated_amazon_prefixes
    raw_capture_object_key:
      template: <env>/raw-captures/amazon/us/<asin>/<yyyy>/<mm>/<dd>/<run_id>/<sha256>/<filename>
      content_address: sha256_of_stored_bytes
      exact_retry: reuse_same_coordinate
      changed_bytes: preserve_new_coordinate_without_overwriting_old_object
      same_run_normalized_capture: reject_divergent_digest
    persistence_handler: amazon_product_fact_upsert
    fact_bundle_transaction:
      database_scope: one_capture_database_transaction
      includes:
        - product_identity_and_master
        - product_snapshot
        - raw_capture_indexes
        - featured_offer
        - variants
        - bsr
        - media_assets_and_relations
        - feishu_binding
        - latest_snapshot_pointer
      commit_visibility: all_or_nothing
      latest_snapshot_publish: final_database_write
      excludes:
        - object_storage_objects
        - feishu_projection_write
    runtime_result_policy: compact_references_only
    required_evidence:
      - normalized_capture_ref
      - raw_capture_refs
      - field_coverage
    raw_capture_kinds:
      required_on_success:
        - normalized_capture
        - html
      optional:
        - network_data
        - screenshot
    raw_capture_metadata:
      normalized_capture:
        content_type: application/json
        sanitization_status: normalized
      html:
        content_type: application/gzip
        sanitization_status: sanitized
      network_data:
        content_type: application/json
        sanitization_status: allowlisted
      screenshot:
        content_type: image/png
        sanitization_status: not_applicable
    raw_capture_provenance:
      required_fields:
        - request_id
        - execution_id
        - run_id
      request_binding: active_runtime_request
      execution_binding: one_origin_browser_execution
      run_binding: active_collection_run
      persisted_execution_id: origin_browser_execution_id
      stored_byte_digest_verification: required_before_fact_write
      html_payload_validation:
        encoding: valid_gzip_utf8
        sanitization_revalidation: required_after_decompression
        sensitive_element_detection: independent_html_parser
        screenshot_masking_failure: fail_closed_without_screenshot_upload
      size_limits:
        normalized_capture_bytes: 2097152
        compressed_html_bytes: 2097152
        decompressed_html_bytes: 8388608
        network_data_bytes: 524288
        screenshot_bytes: 10485760
        materialized_media_bytes: 26214400
    raw_capture_key_collision: reject_changed_immutable_evidence
    field_evidence_policy:
      contract_revision: 2
      accepted_capture_revisions:
        - 1
        - 2
      coverage: exact_target_field_set
      target_fields:
        - product.title
        - product.brand
        - product.category_path
        - product.bullet_points
        - product.description
        - product.technical_details
        - commerce.availability_status
        - commerce.rating
        - commerce.review_count
        - commerce.featured_offer.seller_id
        - commerce.featured_offer.seller_name
        - commerce.featured_offer.is_buy_box
        - commerce.featured_offer.price_amount
        - commerce.featured_offer.list_price_amount
        - commerce.featured_offer.currency
        - commerce.featured_offer.fulfillment_channel
        - commerce.featured_offer.delivery_text
        - commerce.featured_offer.coupon_text
        - commerce.featured_offer.promotions
        - variants.parent_asin
        - variants.child_asins
        - variants.current_attributes
        - variants.dimensions
        - rankings
        - media.main_image
        - media.gallery_images
      required_keys:
        - value
        - status
        - source_kind
        - source_locator
        - confidence
      value_binding: exact_normalized_capture_field_value
      missing_requires_empty_capture_value: true
      success_allows_missing: false
      partial_success_requires_missing: false
    normalized_capture_contract:
      current_revision: 2
      accepted_revisions:
        - 1
        - 2
      new_browser_output_revision: 2
      revision_1_promotions: text_array
      revision_2_promotions:
        type: object_array
        exact_keys:
          - promotion_type
          - label
          - discount_type
          - discount_value
          - deal_price
          - reference_price
          - reference_price_type
          - currency
          - prime_only
          - claim_required
          - raw_text
        promotion_types:
          - coupon
          - limited_time_deal
        discount_types:
          - percentage
          - amount
          - price_override
        reference_price_types:
          - null
        observation_time_binding: parent_capture.captured_at
        profile_context_binding: parent_capture.profile_context_digest
      compatibility:
        persistence_reads_revision_1: true
        revision_1_rewrite_required: false
        fact_schema_ddl_required: false
        legacy_coupon_text_preserved: true
      dom_text_policy:
        controlled_offer_regions_only: true
        exclude_tags:
          - script
          - style
          - noscript
          - template
        forbidden_content:
          - redeem_parameters
          - token
          - cookie
          - account_or_address_text
      field_semantics:
        commerce.featured_offer.promotions:
          allowed_types:
            - coupon
            - limited_time_deal
          excluded_page_offers:
            - checkout_discount
            - prime_member_price
            - prime_exclusive_price
            - prime_day_deal
            - subscribe_and_save
            - quantity_discount
            - qualifying_purchase
            - ordinary_strikethrough_price
            - other
          limited_time_deal_fields:
            keep:
              - label
              - deal_price
            clear:
              - discount_value
              - reference_price
              - reference_price_type
          projection_field: 促销活动记录
          projection_write_policy: overwrite_current_snapshot
          projection_empty_observation: clear_field
          projection_timestamp_timezone: Asia/Shanghai
          coupon_calculated_price_source: commerce.featured_offer.price_amount
        product.technical_details.Number of Items:
          source: Product information.Item details.Number of Items
          projection_field: 包装规格
          projection_missing_value: 没有包装规格
          forbidden_fallback_sources:
            - Unit Count
            - quantity_selector
            - product_title
        commerce.featured_offer.delivery_text:
          required_prefix: FREE delivery
          source: featured_offer_primary_delivery_message
          projection_field: 送达日期
          projection_format: english_date_or_date_range_only
          strip_segments:
            - free_delivery_label
            - order_threshold
            - destination_address_and_postcode
            - fastest_delivery
            - order_countdown
            - account_text
    network_data_policy:
      source: exact_same_origin_page_fetch_or_xhr
      identity_binding: resolved_asin
      persisted_body: capture_field_allowlist_only
      runtime_body: forbidden
    media_source_url_policy:
      enforcement_owner: media_asset_sync
      caller_override_policy: may_only_tighten
      download_size_limit_bytes: 26214400
      identity_conflict_policy: reject
      amazon_marketplace_policy: require_us
      caller_materialized_fields_policy: forbidden
      scheme: https
      allowed_host_suffixes:
        - media-amazon.com
        - ssl-images-amazon.com
      allowed_ports:
        - default
        - 443
      userinfo: forbidden
      redirect_policy: validate_each_hop_against_same_allowlist_before_request
      redirect_response_body_limit: download_size_limit_bytes_each_hop
      query_and_fragment: strip_before_persistence
      invalid_observed_media: remove_and_mark_partial_success
    prohibited_fact_targets:
      - tk_*
    media_coverage_policy:
      stored_object_verification:
        existence: required_before_fact_write
        content_digest: sha256_of_stored_bytes
        size_bytes: exact_match
        mime_type: allowlisted_image_signature_match
        object_key: content_addressed_by_digest
      validated_subset_may_persist: true
      unexpected_assets: reject
      duplicate_role_position_mapping: reject
      same_source_url_distinct_role_position: preserve_each_relation
      invalid_storage_reference: reject
      missing_observed_assets_status: partial_success
      compact_summary_fields:
        - expected
        - materialized
        - missing
        - complete
      projection:
        main_image: project_independently_when_materialized
        gallery_images: project_only_when_the_observed_gallery_is_fully_materialized

formal_workflow_persistence_contract:
  required_flags:
    requires_fact_db: true
    requires_object_storage: true
  runtime_config_source:
    primary: project_runtime_config
    allowed_files:
      - scripts/execution_control/executor.local.env
      - process_environment
      - deployment_environment
    test_only_submit_override:
      allowed: true
      marker: allow_test_persistence_overrides
      purpose: isolate pytest/integration fixtures from local project config
  formal_skill_payload_boundary:
    carries_business_inputs_only: false
    allowed_non_business_snapshots:
      - field: table_refs
        content: secret_free_feishu_table_urls
        source: amazon_skill_local_env
        required: true
        runtime_route_fallback: forbidden
        allowed_workflows:
          - refresh_amazon_product_row_by_asin
          - refresh_current_amazon_product_table
    run_mode_policy: forbidden_in_formal_skill_payload
    forbidden_fields:
      - run_mode
      - db_url
      - execution_control_db_url
      - fact_db_url
      - execution_control_fact_db_url
      - artifact_store_provider
      - execution_control_artifact_store_provider
      - artifact_bucket
      - execution_control_artifact_bucket
      - minio_endpoint
      - execution_control_minio_endpoint
      - minio_access_key
      - execution_control_minio_access_key
      - minio_secret_key
      - execution_control_minio_secret_key
      - s3_access_key
      - s3_secret_key
      - browser_profile_ref
      - browser_provider_name
      - browser_profile_id
      - browser_workspace_id
      - browser_cookies
      - BROWSER_PROFILE_REF
      - BROWSER_PROVIDER_NAME
      - BROWSER_PROFILE_ID
      - BROWSER_WORKSPACE_ID
      - BROWSER_PROFILES_FILE
      - DEFAULT_PROFILE_REF
    allowed_non_sensitive_runtime_summary:
      - requires_fact_db
      - requires_object_storage
      - require_database_persistence
      - require_object_storage
      - artifact_store.provider
      - artifact_store.bucket
      - artifact_store.object_prefix
      - runtime_config_source
  submit_preflight:
    missing_runtime_db: reject_submit
    missing_fact_db: reject_submit
    missing_artifact_provider: reject_submit
    missing_artifact_bucket: reject_submit
    missing_minio_or_s3_config: reject_submit
  handler_fail_fast:
    fact_bundle_upsert:
      require_database_persistence: true
      missing_fact_db_url: failed
      forbidden_success_modes:
        - dry_run
    media_asset_sync:
      require_object_storage: true
      missing_object_storage: failed
      provider_local: failed
      forbidden_success_modes:
        - linked_local

media_rules:
  product_main_image:
    must_materialize: true
    storage: MinIO or configured artifact/object store
  product_gallery_image:
    must_materialize: true
    storage: MinIO or configured artifact/object store
  product_sku_image:
    must_materialize: true
    storage: MinIO or configured artifact/object store

forbidden_patterns:
  - flow_specific_media_fact_persistence
  - feishu_projection_drives_fact_persistence
  - product_fact_collection_helper_without_contract
  - raw_cdn_url_persisted_as_fact_media_without_object_key_or_remote_uri
  - formal_fact_bundle_upsert_dry_run_success
  - formal_media_asset_sync_linked_local_success
  - feishu_raw_rows_embedded_in_runtime_result_json
  - full_feishu_source_fields_embedded_in_runtime_source_rows

allowed_implementation_owners:
  - src/automation_business_scaffold/capabilities/fact_sources/**
  - src/automation_business_scaffold/capabilities/media/**
  - src/automation_business_scaffold/domains/**/mappers/**
  - src/automation_business_scaffold/domains/**/projections/**
  - src/automation_business_scaffold/capabilities/**/fact*
  - src/automation_business_scaffold/control_plane/**

forbidden_new_modules_by_default:
  - src/automation_business_scaffold/domains/**/facts/*collection*.py
  - src/automation_business_scaffold/domains/**/*helper*.py
  - src/automation_business_scaffold/domains/**/*service*.py
  - src/automation_business_scaffold/domains/**/*manager*.py
  - src/automation_business_scaffold/domains/**/*coordinator*.py

schema_version: 1
contract_type: workflow_contract
workflow_code: search_keyword_selection_products
task_code: search_keyword_selection_products
owner: business

business_requirement: docs/business/requirements/search-keyword-selection-products.md
architecture_design: docs/arch/workflow-selection-table-design.md
business_requirement_note: 关键词搜索选品写入 — FastMoss 搜索过滤后写入 TK选品收集种子行，再复用选品采集行级 pipeline。

purpose: >
  Search FastMoss products by keyword, filter candidates before insertion, seed matching rows into
  TK选品收集, then refresh only newly inserted rows through the existing selection row pipeline.

target_table:
  feishu_table_name: TK选品收集
  table_code: tk_selection

payload_contract:
  fastmoss_phone_env:
    type: env_ref
    required: false
    source: skill_payload
    invariant: Contains an environment variable name, not a FastMoss phone value.
  fastmoss_password_env:
    type: env_ref
    required: false
    source: skill_payload
    invariant: Contains an environment variable name, not a FastMoss password value.
  propagation:
    - keyword_seed_import.payload.search_request.fastmoss.phone_env
    - keyword_seed_import.payload.search_request.fastmoss.password_env

persistence_requirements:
  requires_fact_db: true
  requires_object_storage: true
  fact_bundle_upsert:
    require_database_persistence: true
    missing_fact_db_policy: fail_fast
    forbidden_success_modes:
      - dry_run
  media_asset_sync:
    require_object_storage: true
    missing_object_storage_policy: fail_fast
    provider_local_policy: fail_fast
    forbidden_success_modes:
      - linked_local

stages:
  - stage_code: keyword_seed_import
    job_code: keyword_seed_import
    mapper_code: selection_seed_projection_mapper
    invariant: FastMoss search-list filtering runs before Feishu seed insertion.
  - stage_code: fastmoss_security_browser_fallback
    job_code: fastmoss_security_browser_resolve
    invariant: MSG_SAFE_0001 search verification may be resolved once in browser and then retried.
  - stage_code: dispatch_selection_row_refresh_jobs
    execution_mode: executor_action
    invariant: Only seed rows with seed_status=success are dispatched downstream.
  - stage_code: refresh_selection_rows
    job_code: selection_row_refresh
    flow_code: selection_row_pipeline
    invariant: Downstream collection uses the same row-level selection pipeline and may only emit a business browser request; it must not execute browser fallback inline in the API worker.
  - stage_code: selection_row_browser_fallback
    job_code:
      - tiktok_product_browser_fetch
      - fastmoss_security_browser_resolve
    runtime_table: task_execution
    invariant: Waiting row job is the only pending fallback fact; task_execution is the browser task fact; row-level browser fallback is never inline API worker execution.
  - stage_code: ready_for_summary
    job_code: task_completed_notification

protected_invariants:
  - Existing selection rows are skipped by insert_if_absent and must not be overwritten by keyword seed import.
  - Skipped existing rows must not trigger selection_row_refresh fan-out.
  - Formal refresh fan-out must pass requires_fact_db=true and requires_object_storage=true; Fact DB dry_run or local media success is invalid.
  - New seed rows write 商品ID, 商品链接, 关键词, 备注, and 记录日期.
  - 备注 must be written as 通过搜索关键字：{关键词} on keyword seed creation.
  - Default search-list filters are 近7天销量 >= 500 and price range maximum >= 10.99.
  - If FastMoss returns a price range, the maximum price in that range is used for the price threshold.
  - Price filtering is a candidate filter, not a pagination early-stop condition.
  - Detail refresh must reuse selection_row_refresh and selection_table_projection_mapper behavior.
  - selection_row_refresh may report a business browser request with fallback_handler and browser_fallback_payload; compatibility result may still include fallback_required, but it is not a Runtime DB lifecycle status or final row status.
  - selection_row_refresh.status=waiting is the only pending row-level fallback fact; executor/runtime must enqueue or wait for task_execution, then write browser result references, cookie cache metadata, or failure evidence back to the same selection_row_refresh row job before it can become pending again or terminal.
  - pending/running/waiting/finished/cancelled are execution lifecycle states; success/partial_success/failed/skipped are terminal result_status values.
  - TikTok browser fallback may substitute the current TikTok collection stage output through task_execution.result_json normalized_product_result and artifact refs; FastMoss security browser fallback only persists fastmoss_session_cookie_cache and unblocks one retry of the original FastMoss API stage.
  - fallback_required, browser task_execution success, and seed write success are not detail refresh terminal statuses; ready_for_summary requires final row_status/result_status for every newly inserted seed row and no waiting row jobs or active browser executions; it must not depend on derived candidate counts.

payload_defaults:
  sales_7d_threshold: 500
  product_price_threshold: 10.99
  keyword_workflow_mode: selection

write_policy:
  seed_write_mode: insert_if_absent
  seed_projection_mapper: selection_seed_projection_mapper
  detail_projection_mapper: selection_table_projection_mapper

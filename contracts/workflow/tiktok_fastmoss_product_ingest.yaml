schema_version: 1
contract_type: workflow_contract
workflow_code: tiktok_fastmoss_product_ingest
domain: product_fact_ingest
task_code: tiktok_fastmoss_product_ingest
status: complete

business_requirement: null
business_requirement_note: 当前已有系统入口和设计文档，但尚未沉淀为正式客户流程需求
architecture_design: docs/arch/workflow-selection-analysis-design.md
implementation_manifest: src/automation_business_scaffold/contracts/workflow/tiktok_fastmoss_product_ingest.yaml
field_contracts:
  - contracts/fields/feishu-tk-selection.yaml
state_contracts: []

source_adapter: selection_table_source_adapter
projection_mappers:
  - selection_table_projection_mapper

stages:
  - stage_code: read_selection_rows
    handler_code: feishu_table_read
    source_adapter: selection_table_source_adapter
    purpose: TK selection table mode 下读取来源记录和写回上下文
  - stage_code: collect_product_data
    handler_code: tiktok_product_request_fetch
    purpose: 优先通过 request/API 采集 TikTok 商品事实
  - stage_code: collect_fastmoss_product_data
    handler_code: fastmoss_product_fetch
    purpose: 获取 FastMoss 商品、店铺、指标和关联信息
  - stage_code: browser_fallback
    handler_code: tiktok_product_browser_fetch
    purpose: request 失效、关键字段缺失或风控阻断时才派发浏览器兜底
  - stage_code: sync_media
    handler_code: media_asset_sync
    purpose: 同步图片、封面、头像等媒体资产
  - stage_code: persist_facts
    handler_code: fact_bundle_upsert
    purpose: 写商品、店铺、达人、视频、媒体引用、关系和观测
  - stage_code: writeback_selection_rows
    handler_code: feishu_table_write
    projection_mapper: selection_table_projection_mapper
    purpose: 有来源飞书记录且需要写回时投影到 TK选品收集
  - stage_code: ready_for_summary
    handler_code: outbox_dispatch
    purpose: 汇总 result 并写 outbox

protected_invariants:
  - 商品、店铺、达人、视频、媒体资产属于通用事实，不属于选品分析专有数据
  - TikTok 商品数据采集优先走 request/API 路径
  - Browser 只作为 fallback，用于 request 失效、关键字段缺失或被风控阻断的场景；request 已明确不可售时直接产出不可售终态，不进入 browser fallback
  - 不从该设计文档反推正式客户需求和验收口径

known_architecture_gaps: []

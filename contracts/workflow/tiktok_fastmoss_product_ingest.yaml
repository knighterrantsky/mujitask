schema_version: 1
contract_type: workflow_contract
workflow_code: tiktok_fastmoss_product_ingest
domain: product_fact_ingest
task_code: tiktok_fastmoss_product_ingest
status: complete

business_requirement: docs/business/requirements/tk-selection-collection-expand.md
business_requirement_note: TK 选品表自动采集扩展 — 17 个自动维护字段，行级 pipeline 模型
architecture_design: docs/arch/workflow-selection-table-expand-design.md
implementation_manifest: src/automation_business_scaffold/contracts/workflow/tiktok_fastmoss_product_ingest.yaml
field_contracts:
  - contracts/fields/feishu-tk-selection.yaml
state_contracts: []

source_adapter: selection_table_source_adapter
projection_mappers:
  - selection_table_projection_mapper

persistence_requirements:
  requires_fact_db: true
  requires_object_storage: true
  fact_bundle_upsert:
    require_database_persistence: true
    missing_fact_db_policy: fail_fast
    forbidden_success_modes:
      - dry_run
  media_asset_sync:
    require_object_storage: true
    missing_object_storage_policy: fail_fast
    provider_local_policy: fail_fast
    forbidden_success_modes:
      - linked_local

stages:
  - stage_code: read_selection_rows
    handler_code: feishu_table_read
    source_adapter: selection_table_source_adapter
    purpose: TK selection table 模式下读取候选行，scan missing_auto_fields 与 URL 校验
  - stage_code: dispatch_selection_row_refresh
    handler_code: selection_row_refresh
    purpose: 为每条候选行创建一个 selection_row_refresh 行级 pipeline job
  - stage_code: collect_selection_rows
    handler_code: selection_row_refresh
    purpose: 等待所有 selection_row_refresh 行级 job 终态并回收结果
  - stage_code: ready_for_summary
    handler_code: outbox_dispatch
    purpose: 汇总 result 并写 outbox

protected_invariants:
  - 商品、店铺、达人、视频、媒体资产属于通用事实，不属于选品分析专有数据
  - 行级 pipeline 内部串行：URL 校验 → TikTok request → media sync → FastMoss fetch → fact upsert → 飞书 17 字段写回；商品不可售/区域不可售终态必须跳过 media/FastMoss/图表门禁，但仍写 Fact DB 并回写 商品状态
  - 正式 workflow 使用 fact_bundle_upsert / media_asset_sync 时必须声明严格持久化需求；Runtime 从项目运行配置解析真实 Fact DB 和对象存储，缺配置不能 dry-run 或 local success
  - Browser 只作为 fallback，用于 request 失效或风控阻断；request 已明确不可售时直接产出不可售终态
  - 17 个自动维护字段统一采用 fill_missing_only 策略，不覆盖已有值；商品ID/商品链接 始终刷新

known_architecture_gaps: []

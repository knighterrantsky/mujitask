schema_version: 1
contract_type: workflow_contract
workflow_code: search_keyword_competitor_products
domain: tk_competitor
task_code: search_keyword_competitor_products
status: complete
completed_at: "2026-04-25"
completion_evidence:
  feature_code: tk_keyword_competitor_search
  claim_gate: scripts/harness/claim_done.py tk_keyword_competitor_search --run-gates
  real_request_id: 622126e54fee41d9bdc37d80de7dbafc
  real_outbox_id: 619253a4b8114a92a89b440f313b1adb

business_requirement: docs/business/requirements/search-keyword-competitor-products.md
architecture_design: docs/arch/workflow-competitor-table-design.md
implementation_manifest: src/automation_business_scaffold/contracts/workflow/search_keyword_competitor_products.yaml
field_contracts:
  - contracts/fields/feishu-tk-competitor.yaml
state_contracts:
  - contracts/states/tk-competitor-product-status.yaml

projection_mappers:
  - competitor_seed_projection_mapper
  - competitor_table_projection_mapper
parameter_mappers:
  - keyword_search_parameter_mapper

payload_contract:
  fastmoss_phone_env:
    type: env_ref
    required: false
    source: skill_payload
    invariant: Contains an environment variable name, not a FastMoss phone value.
  fastmoss_password_env:
    type: env_ref
    required: false
    source: skill_payload
    invariant: Contains an environment variable name, not a FastMoss password value.
  propagation:
    - keyword_seed_import.payload.search_request.fastmoss.phone_env
    - keyword_seed_import.payload.search_request.fastmoss.password_env

persistence_requirements:
  requires_fact_db: true
  requires_object_storage: true
  fact_bundle_upsert:
    require_database_persistence: true
    missing_fact_db_policy: fail_fast
    forbidden_success_modes:
      - dry_run
  media_asset_sync:
    require_object_storage: true
    missing_object_storage_policy: fail_fast
    provider_local_policy: fail_fast
    forbidden_success_modes:
      - linked_local

stages:
  - stage_code: keyword_seed_import
    job_code: keyword_seed_import
    handler_code: keyword_seed_import
    parameter_mapper: keyword_search_parameter_mapper
    projection_mapper: competitor_seed_projection_mapper
    purpose: 按关键词和 filter 搜索 FastMoss normalized candidates，并按顺序写入竞品种子行
    internal_steps:
      - keyword_search_parameter_mapper
      - fastmoss_product_search
      - feishu_table_write
  - stage_code: fastmoss_security_browser_fallback
    job_code: fastmoss_security_browser_resolve
    handler_code: fastmoss_security_browser_resolve
    worker_type: browser_worker
    runtime_table: task_execution
    purpose: 当 keyword_seed_import 或后续 FastMoss provider API 因 MSG_SAFE_0001 需要浏览器解风控时，围绕原始失败 FastMoss API 的 verification_request 解除滑块、二次确认、持久化 fastmoss_session_cookie_cache，并允许原调用方重试原接口一次
    trigger:
      upstream_stage: keyword_seed_import
      upstream_handler_status: wait_or_fallback_signal
      response_code: MSG_SAFE_0001
    success_contract:
      verified_path: original_failed_fastmoss_api_path
      example_paths:
        - /api/goods/V2/search
        - /api/goods/v3/base
      cookie_cache_table: fastmoss_session_cookie_cache
      redacted_cookie_fields:
        - cookie_count
        - has_fd_tk
        - fd_tk_digest
  - stage_code: refresh_competitor_rows
    job_code: competitor_row_refresh
    handler_code: competitor_row_refresh
    projection_mapper: competitor_table_projection_mapper
    purpose: 复用竞品行刷新逻辑补齐自动维护字段和必要状态
  - stage_code: ready_for_summary
    handler_code: outbox_dispatch
    purpose: 汇总搜索、新增、跳过和刷新结果

protected_invariants:
  - 已存在商品直接跳过，不重复新增，也不重写现有记录
  - 新商品先写 SKU-ID、产品链接和 备注=通过搜索关键字：{关键词}
  - 正式 workflow 使用 fact_bundle_upsert / media_asset_sync 时必须声明严格持久化需求；Runtime 从项目运行配置解析真实 Fact DB 和对象存储，缺配置不能 dry-run 或 local success
  - max_candidates 默认 20；传 0 表示不按候选数截断，直到分页、FastMoss total、空页、无新商品或 below_min_day7_sold_count 等停止条件触发
  - FastMoss 关键词搜索按 order=2,2 的 7 日销量倒序返回且存在 min_day7_sold_count 时，如果整页 day7_sold_count 最大值低于阈值，应停止继续翻页
  - FastMoss provider API 风控 fallback 对同一原始请求最多一次；browser fallback 成功判据是原始失败的 FastMoss API 请求不再返回 MSG_SAFE_0001，搜索场景必须验证原始 /api/goods/V2/search，商品详情页不能作为搜索风控解除成功判据
  - FastMoss browser fallback 只持久化 cookies，不是 API token；cookie value 不得出现在 summary/log/result 中
  - fastmoss_product_fetch、fastmoss_creator_fetch、fastmoss_shop_fetch、fastmoss_video_fetch 遇到 MSG_SAFE_0001 时必须返回业务化 browser request（兼容期可包含 fallback_required）、reason=fastmoss_api_security_verification 和脱敏 verification_request；成功解风控后只允许重试原 handler 一次
  - FastMoss 与 TikTok 商品页验证码逻辑独立；FastMoss browser fallback 使用 FastMoss/Tencent selector profile 和 framework SliderCaptchaResolver，并保留 slider_captcha_audit_artifact_refs
  - 验证码等待只在已识别风控信号后发生；正常 FastMoss 搜索、正常 TikTok request、正常 TikTok 商品页采集不得进入滑块等待
  - image_timeout_ms 是元素出现的最大等待，不是固定 sleep；滑动后最多轮询 5 秒验证结果，弹窗消失后延迟 2 秒二次确认
  - TikTok 商品页默认 simple_target=false；FastMoss/TikTok 可以共用 framework SliderCaptchaResolver，但不得共用业务 handler、成功判据或 cookie/token 持久化策略
  - slider 审计必须记录 ddddocr 原始坐标、坐标换算、拖动距离、前后截图、失败态文本、滑动后轮询结果和二次确认结果
  - FastMoss browser fallback 失败或 API 原接口重试后仍为 MSG_SAFE_0001 时，终态错误为 fastmoss_security_verification_required
  - FastMoss session/cookie 恢复属于 infrastructure/fastmoss；last_auth_failed_at 已标记的 cookie 不得复用，刷新后仍 auth 失败时终态错误为 fastmoss_session_conflict_or_external_login
  - 新商品详情抓取判定不可访问时，保留种子字段并写 商品状态=已下架/区域不可售
  - fallback_required is a compatibility handler signal, not a Runtime DB lifecycle status or final result_status; pending/running/waiting/finished/cancelled are lifecycle states, success/partial_success/failed/skipped are terminal result_status values
  - Waiting competitor_row_refresh is the only pending row-level fallback fact, and task_execution is the browser task fact; handler output may request a browser handler, but executor/runtime owns browser task scheduling and browser result writeback to the original row job
  - TikTok browser fallback may substitute the current TikTok collection stage output through task_execution.result_json normalized_product_result and artifact refs; FastMoss security browser fallback only persists fastmoss_session_cookie_cache and unblocks one retry of the original FastMoss API stage
  - fallback_required、FastMoss browser success、TikTok browser success 和 seed write success 都不是详情采集终态；ready_for_summary 只能汇总 keyword_seed_import 终态和每条成功 seed row 的最终 competitor_row_refresh row_status/result_status，且不得存在 waiting row job 或 active browser execution，不得依赖派生 candidate 数量
  - 新商品详情补齐必须请求 FastMoss goods.overview 的 d_type=7、d_type=28、d_type=90 三个窗口；d_type=28 用于常规概览和结构数据，d_type=90 用于近90天销量，所有窗口必须在 raw_api_responses.request_params.d_type 和 product_metric_snapshots.window_days 中可审计
  - 详情补齐必须遵守竞品行刷新字段契约

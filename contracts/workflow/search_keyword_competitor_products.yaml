schema_version: 1
contract_type: workflow_contract
workflow_code: search_keyword_competitor_products
domain: tk_competitor
task_code: search_keyword_competitor_products
status: migrated_existing

business_requirement: docs/business/requirements/search-keyword-competitor-products.md
architecture_design: docs/arch/workflow-competitor-table-design.md
implementation_manifest: src/automation_business_scaffold/contracts/workflow/search_keyword_competitor_products.yaml
field_contracts:
  - contracts/fields/feishu-tk-competitor.yaml
state_contracts:
  - contracts/states/tk-competitor-product-status.yaml

projection_mappers:
  - competitor_seed_projection_mapper
  - competitor_table_projection_mapper

stages:
  - stage_code: search_competitor_products
    handler_code: fastmoss_product_search
    purpose: 按关键词和销量阈值搜索 FastMoss 商品候选
  - stage_code: write_competitor_seed_rows
    handler_code: feishu_table_write
    projection_mapper: competitor_seed_projection_mapper
    purpose: 新商品先写 SKU-ID、产品链接和来源备注
  - stage_code: refresh_competitor_rows
    job_code: competitor_row_refresh
    handler_code: competitor_row_refresh
    projection_mapper: competitor_table_projection_mapper
    purpose: 复用竞品行刷新逻辑补齐自动维护字段和必要状态
  - stage_code: ready_for_summary
    handler_code: outbox_dispatch
    purpose: 汇总搜索、新增、跳过和刷新结果

protected_invariants:
  - 已存在商品直接跳过，不重复新增，也不重写现有记录
  - 新商品先写 SKU-ID、产品链接和 备注=通过搜索关键字：{关键词}
  - 新商品详情抓取判定不可访问时，保留种子字段并写 商品状态=已下架/区域不可售
  - 详情补齐必须遵守竞品行刷新字段契约

known_architecture_gaps:
  - code: row_refresh_job_alignment
    description: 当前实现 manifest 仍列出部分 leaf handler；目标契约要求详情补齐收敛到 competitor_row_refresh 行级主 job

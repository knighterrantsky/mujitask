field_contracts:
  - contracts/fields/feishu-tk-competitor.yaml
state_contracts:
  - contracts/states/tk-competitor-product-status.yaml

projection_mappers:
  - competitor_seed_projection_mapper
  - competitor_table_projection_mapper
parameter_mappers:
  - keyword_search_parameter_mapper

stages:
  - stage_code: keyword_seed_import
    job_code: keyword_seed_import
    handler_code: keyword_seed_import
    parameter_mapper: keyword_search_parameter_mapper
    projection_mapper: competitor_seed_projection_mapper
    purpose: 按关键词和 filter 搜索 FastMoss normalized candidates，并按顺序写入竞品种子行
    internal_steps:
      - keyword_search_parameter_mapper
      - fastmoss_product_search
      - feishu_table_write
  - stage_code: fastmoss_security_browser_fallback
    job_code: fastmoss_security_browser_resolve
    handler_code: fastmoss_security_browser_resolve
    worker_type: browser_worker
    runtime_table: task_execution
    purpose: 当 keyword_seed_import 因 FastMoss MSG_SAFE_0001 需要浏览器解风控时，围绕原始 /api/goods/V2/search 请求解除滑块、二次确认、持久化 fastmoss_session_cookie_cache，并允许重新派发原始搜索
    trigger:
      upstream_stage: keyword_seed_import
      upstream_handler_status: fallback_required
      response_code: MSG_SAFE_0001
    success_contract:
      verified_path: /api/goods/V2/search
      cookie_cache_table: fastmoss_session_cookie_cache
      redacted_cookie_fields:
        - cookie_count
        - has_fd_tk
        - fd_tk_digest
  - stage_code: refresh_competitor_rows
    job_code: competitor_row_refresh
    handler_code: competitor_row_refresh
    projection_mapper: competitor_table_projection_mapper
    purpose: 复用竞品行刷新逻辑补齐自动维护字段和必要状态
  - stage_code: ready_for_summary
    handler_code: outbox_dispatch
    purpose: 汇总搜索、新增、跳过和刷新结果

protected_invariants:
  - 已存在商品直接跳过，不重复新增，也不重写现有记录
  - 新商品先写 SKU-ID、产品链接和 备注=通过搜索关键字：{关键词}
  - max_candidates 默认 20；传 0 表示不按候选数截断，直到分页、FastMoss total、空页或无新商品等停止条件触发
  - FastMoss 搜索风控 fallback 最多一次；browser fallback 成功判据是原始 /api/goods/V2/search 不再返回 MSG_SAFE_0001，商品详情页不能作为搜索风控解除成功判据
  - FastMoss browser fallback 只持久化 cookies，不是 API token；cookie value 不得出现在 summary/log/result 中
  - FastMoss browser fallback 失败或 API 原接口重试后仍为 MSG_SAFE_0001 时，终态错误为 fastmoss_security_verification_required
  - 新商品详情抓取判定不可访问时，保留种子字段并写 商品状态=已下架/区域不可售
  - 详情补齐必须遵守竞品行刷新字段契约

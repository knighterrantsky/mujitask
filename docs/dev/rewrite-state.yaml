schema_version: 1
status: active_rewrite
current_phase: domains_runtime_rewrite

canonical_runtime_owners:
  domain_business_logic: "src/automation_business_scaffold/domains/**"
  reusable_capabilities: "src/automation_business_scaffold/capabilities/**"
  runtime_control_plane: "src/automation_business_scaffold/control_plane/**"
  implementation_contracts: "src/automation_business_scaffold/contracts/**"
  machine_contracts: "contracts/**"

legacy_reference_only:
  - path: "src/automation_business_scaffold/business/**"
    rule: "Legacy/reference implementation only; current new business implementation belongs in domains/** and this path can be deleted after rewrite."
  - path: "docs/business/**"
    rule: "Business requirements and acceptance reference only; not a default implementation owner."

allowed_broken:
  - "full import during rewrite"
  - "full end-to-end execution"
  - "some legacy references while migration is incomplete"

must_remain_green:
  - "architecture ownership checks"
  - "contract yaml parse checks"
  - "no runtime import from achieve"
  - "completion claim gate"

completion_policy:
  default_claim: not_complete
  require_feature_code: true
  roadmap: "contracts/harness/code-roadmap.yaml"
  claim_gate: "scripts/harness/claim_done.py"
  require_done_gate_before_complete: true
  forbid_complete_without_gate_pass: true
  final_response_fields:
    - status
    - files_changed
    - checks_run
    - failed_gates_or_blockers
